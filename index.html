<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="controlsContainer">
        <label for="levelFile" class="file-input-label">Load level
            <input type="file" id="levelFile" accept=".txt" autofocus />
        </label>
        <button type="button" id="restartLevel" disabled>Restart level</button>
        <label for="controlSource" class="control-source-label">Control</label>
        <select id="controlSource">
            <option value="player" selected>Player</option>
            <option value="ai">AI</option>
        </select>
        <span id="levelStatus">Select a level file to start</span>
    </div>
    <h1 id="levelHeading" class="level-heading is-hidden" aria-hidden="true"></h1>
    <div id="gameLayout">
        <canvas id="gameCanvas"></canvas>
        <canvas id="inventoryCanvas"></canvas>
    </div>
    <!-- Core ECS and utilities -->
    <script src="ecs.js"></script>
    <script src="math-utils.js"></script>
    <script src="input-buffer.js"></script>
    <script src="control-input.js"></script>
    <script src="input-sources.js"></script>
    <script src="navigation.js"></script>
    <script src="camera.js"></script>
    <script src="animation.js"></script>
    <script src="render.js"></script>
    <script src="tangram-pieces.js"></script>
    <script src="decoration-placement.js"></script>
    <script src="spawn-placement.js"></script>
    <script src="decoration-sprites.js"></script>
    <script src="level.js"></script>
    <script src="animations.js"></script>

    <!-- Components -->
    <script src="components/input-component.js"></script>
    <script src="components/movement-component.js"></script>
    <script src="components/velocity-tracker-component.js"></script>
    <script src="components/physics-component.js"></script>
    <script src="components/animation-component.js"></script>
    <script src="components/tangram-piece-component.js"></script>
    <script src="components/decoration-component.js"></script>
    <script src="components/inventory-component.js"></script>
    <script src="components/collectible-component.js"></script>
    <script src="components/walkable-component.js"></script>
    <script src="components/player-controlled-component.js"></script>
    <script src="components/ai-agent-component.js"></script>
    <script src="components/ai-plan-component.js"></script>
    <script src="components/ai-navigation-component.js"></script>
    <script src="components/ai-progress-component.js"></script>

    <!-- Systems -->
    <script src="systems/ai-system.js"></script>
    <script src="systems/input-system.js"></script>
    <script src="systems/movement-system.js"></script>
    <script src="systems/boundary-system.js"></script>
    <script src="systems/physics-system.js"></script>
    <script src="systems/animation-system.js"></script>
    <script src="systems/animator-update-system.js"></script>
    <script src="systems/tangram-collection-system.js"></script>
    <script src="systems/game-over-system.js"></script>
    <script src="systems/tangram-render-system.js"></script>
    <script src="systems/decoration-render-system.js"></script>
    <script src="systems/inventory-render-system.js"></script>

    <!-- Engine and managers -->
    <script src="game-states.js"></script>
    <script src="state-manager.js"></script>
    <script src="level-manager.js"></script>
    <script src="engine.js"></script>

    <!-- Game loop -->
    <script src="game.js"></script>
</body>
</html>
